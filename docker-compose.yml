# MahaFarm — full-stack local deployment
#   docker compose up --build         start everything
#   docker compose exec api npm run seed   load the demo data (run once)
#   open http://localhost:8080
#
# Services:
#   mongo — database (internal only, data persisted in a named volume)
#   api   — Express backend  (also published on :5000 for direct access)
#   web   — built frontend served by nginx, proxying /api → api:5000

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  api:
    build: ./server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "5000"
      MONGODB_URI: mongodb://mongo:27017/mahafarm
      JWT_SECRET: change_this_in_real_deployments
      JWT_EXPIRES_IN: 7d
      COOKIE_SECURE: "false"
      CLIENT_URL: http://localhost:8080
    depends_on:
      - mongo
    ports:
      - "5000:5000"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_ENABLE_MOCK_DATA: "false"
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  mongo_data:
