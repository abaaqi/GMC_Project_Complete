# Netlify config for the MahaFarm frontend (SPA).
# Set VITE_API_BASE_URL and VITE_ENABLE_MOCK_DATA in Site settings → Environment.

[build]
  command = "npm run build"
  publish = "dist"

# Client-side routing fallback
[[redirects]]
     from = api
     to = "https://gmc-project-complete.onrender.com/api/:splat"
     status = 200
     force = true
